# =============================================================================
# Конфигурация GA4 pipeline
# =============================================================================
# Собираем ВСЕ события без фильтрации (Schema-on-Read)
# Фильтрация происходит в dbt моделях, не при извлечении.
#
# Особенности:
#   - BigQuery сканирует всю таблицу независимо от WHERE по event_name
#   - Фильтрация не экономит деньги, но и не приводит к потере данных
# =============================================================================

bigquery:
  project_id: "m-project_id"
  dataset_id: "analytics_123456789"
  location: "EU"
  table_priority:
    - "events_{date}"
    - "events_intraday_{date}"

loading:
  batch_size: 100000
  parquet_compression: "snappy"
