# =============================================================================
# CLICKHOUSE v2 — КОНФИГУРАЦИЯ
# =============================================================================
# Запуск:     docker compose --env-file ../.env up -d
# Остановка:  docker compose --env-file ../.env down
# Логи:       docker compose --env-file ../.env logs -f
# CLI:        docker exec -it datastack2-clickhouse clickhouse-client --password $CLICKHOUSE_PASSWORD
# =============================================================================

services:
  clickhouse:
    # -------------------------------------------------------------------------
    # ОБРАЗ
    # -------------------------------------------------------------------------
    # alpine — легковесный (~150MB)    
    image: clickhouse/clickhouse-server:25.12-alpine

    container_name: datastack-clickhouse
    hostname: datastack-clickhouse

    # -------------------------------------------------------------------------
    # СЕТЬ
    # -------------------------------------------------------------------------
    networks:
      - datastack-network

    # -------------------------------------------------------------------------
    # ПОРТЫ
    # -------------------------------------------------------------------------
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"     # HTTP API (DBeaver, Redash)
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"   # Native (dbt, Airflow)

    # -------------------------------------------------------------------------
    # ПЕРЕМЕННЫЕ ОКРУЖЕНИЯ
    # -------------------------------------------------------------------------
    environment:
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      TZ: ${TIMEZONE:-Asia/Bishkek}

    # ENTRYPOINT
    entrypoint: ["/bin/sh", "-c", "mkdir -p /var/lib/clickhouse/tmp && exec /entrypoint.sh"]

    # -------------------------------------------------------------------------
    # VOLUMES
    # -------------------------------------------------------------------------
    volumes:
      # Данные - bind mount, видно в файловой системе
      - ./data:/var/lib/clickhouse
      # Логи
      - ./logs:/var/log/clickhouse-server
      # Конфиг (один файл - всё что нужно)
      - ./config/config.d:/etc/clickhouse-server/config.d:ro
      # Init-скрипты (выполняются при первом запуске)
      - ./init-scripts:/docker-entrypoint-initdb.d:ro

    # -------------------------------------------------------------------------
    # ЛИМИТЫ ЛОГОВ КОНТЕЙНЕРА (docker logs)
    # -------------------------------------------------------------------------
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

    # -------------------------------------------------------------------------
    # ULIMITS (ClickHouse открывает много файлов)
    # -------------------------------------------------------------------------
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

    # -------------------------------------------------------------------------
    # HEALTHCHECK
    # -------------------------------------------------------------------------
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

    # -------------------------------------------------------------------------
    # RESTART
    # -------------------------------------------------------------------------
    restart: unless-stopped

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  datastack2-network:
    external: true
