# =============================================================================
# CLICKHOUSE — МИНИМАЛЬНАЯ КОНФИГУРАЦИЯ
# =============================================================================
# Запуск:    docker compose up -d
# Остановка: docker compose down
# Логи:      docker compose logs -f
# Шелл:      docker exec -it clickhouse bash
# CLI:       docker exec -it clickhouse clickhouse-client
# =============================================================================

services:
  clickhouse:
    # -------------------------------------------------------------------------
    # ОБРАЗ
    # -------------------------------------------------------------------------
    # alpine — легковесный образ (~150MB)
    # 25.12 — стабильная версия (январь 2025)
    image: clickhouse/clickhouse-server:25.12-alpine
    
    container_name: clickhouse
    hostname: clickhouse
    
    # -------------------------------------------------------------------------
    # СЕТЬ
    # -------------------------------------------------------------------------
    networks:
      - datastack-network
    
    # -------------------------------------------------------------------------
    # ПОРТЫ
    # -------------------------------------------------------------------------
    ports:
      # HTTP API — для REST запросов, Superset, проверок
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      # Native — для clickhouse-client, высокопроизводительных подключений
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    
    # -------------------------------------------------------------------------
    # ПЕРЕМЕННЫЕ ОКРУЖЕНИЯ
    # -------------------------------------------------------------------------
    environment:
      # Пароль для пользователя default (ОБЯЗАТЕЛЬНО!)
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      # Таймзона
      TZ: ${TIMEZONE:-Asia/Bishkek}
    
    # -------------------------------------------------------------------------
    # COMMAND — создаём tmp папку перед запуском
    # -------------------------------------------------------------------------
    # Проблема: ClickHouse 25.x требует /var/lib/clickhouse/tmp/ для 
    # временных файлов, но в Docker образе её нет по умолчанию.
    # 
    # Решение: создаём папку перед запуском оригинального entrypoint.
    # 
    # Как это работает:
    # 1. mkdir -p — создаёт папку tmp (если не существует)
    # 2. exec /entrypoint.sh — запускает оригинальный entrypoint ClickHouse
    #    (exec заменяет текущий shell-процесс, чтобы сигналы работали корректно)
    # -------------------------------------------------------------------------
    command: >
      /bin/sh -c "
        mkdir -p /var/lib/clickhouse/tmp &&
        exec /entrypoint.sh
      "
    
    # -------------------------------------------------------------------------
    # VOLUMES
    # -------------------------------------------------------------------------
    volumes:
      # Данные — сохраняются между перезапусками
      # Папка tmp будет создана внутри ./data/tmp
      - ./data:/var/lib/clickhouse
      # Логи
      - ./logs:/var/log/clickhouse-server
      # Кастомный конфиг (только логи и таймзона)
      - ./config/config.d:/etc/clickhouse-server/config.d:ro
      # Init-скрипты
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    
    # -------------------------------------------------------------------------
    # ЛИМИТЫ ЛОГОВ КОНТЕЙНЕРА
    # -------------------------------------------------------------------------
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    
    # -------------------------------------------------------------------------
    # ULIMITS
    # -------------------------------------------------------------------------
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    
    # -------------------------------------------------------------------------
    # HEALTHCHECK
    # -------------------------------------------------------------------------
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    
    # -------------------------------------------------------------------------
    # RESTART
    # -------------------------------------------------------------------------
    restart: unless-stopped

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  datastack-network:
    external: true
